<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="AI Literacy for the Modern Workforce — a research-grounded program for mid-career professionals building judgment-level AI competency." />
    <!-- Social preview cards (Open Graph + Twitter). A portfolio piece
         shared via LinkedIn/X should unfurl with a title and description
         rather than a bare URL. og:image is intentionally omitted until a
         dedicated card image exists — most platforms fall back gracefully. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="AI Literacy for the Modern Workforce" />
    <meta property="og:title" content="AI Literacy for the Modern Workforce" />
    <meta property="og:description" content="A research-grounded program for mid-career professionals building judgment-level AI competency." />
    <meta property="og:url" content="https://ai-literacy.ritchot.me" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="AI Literacy for the Modern Workforce" />
    <meta name="twitter:description" content="A research-grounded program for mid-career professionals building judgment-level AI competency." />
    <!-- DM fonts are self-hosted via @fontsource (imported from src/main.tsx
         and inlined into the bundle by vite-plugin-singlefile). No external
         font CDN — zero outbound requests on page load. -->
    <title>AI Literacy for the Modern Workforce</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
